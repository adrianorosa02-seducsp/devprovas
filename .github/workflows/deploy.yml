name: Deploy GEDUC

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-geduc
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/adrianorosa02-seducsp/geduc
  SERVICE_NAME: apps_geduc

jobs:

  build:
    name: Build & publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Listar arquivos no Runner
        run: |
          echo "Estrutura do repositório no runner:"
          ls -R .

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: 3.14

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Validate poetry metadata
        run: poetry check

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container
        id: build-image
        run: |
          docker build \
            -t "${REGISTRY}:latest" \
            -t "${REGISTRY}:${GITHUB_SHA}" \
            .
          docker push "${REGISTRY}:${GITHUB_SHA}"
          docker push "${REGISTRY}:latest"
          echo "image=${REGISTRY}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  #deploy:
