name: Deploy GEDUC

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/adrianorosa02-seducsp/geduc:latest \
            -t ghcr.io/adrianorosa02-seducsp/geduc:${{ github.sha }} \
            .

      - name: Push latest
        run: |
          docker push ghcr.io/adrianorosa02-seducsp/geduc:latest

      - name: Push SHA
        run: |
          docker push ghcr.io/adrianorosa02-seducsp/geduc:${{ github.sha }}

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |

            docker login ghcr.io \
              -u ${{ github.actor }} \
              -p ${{ secrets.GHCR_TOKEN }}

            docker pull ghcr.io/adrianorosa02-seducsp/geduc:latest

            docker service update \
              --image ghcr.io/adrianorosa02-seducsp/geduc:latest \
              --force \
              apps_geduc