name: Deploy GEDUC

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: adrianorosa02-seducsp/inetz-python-runtime

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Tag
        id: vars
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
            -t ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ghcr.io/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Upload Project Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/srv/apps/geduc"

      - name: Deploy Swarm
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |

            export IMAGE_TAG=${{ env.IMAGE_TAG }}

            cd /srv/apps/geduc

            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

            export IMAGE_TAG=${IMAGE_TAG}

            docker stack deploy \
              --with-registry-auth \
              -c infra/labprovas.yaml \
              apps

            docker service update --force apps_geduc