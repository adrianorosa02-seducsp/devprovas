name: Deploy Inetz Lab

# --- O GATILHO QUE ESTAVA FALTANDO ---
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      # 1. PREPARAR SERVIDOR (O segredo do mkdir -p)
      - name: Preparar Diretorio no Servidor
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT }}
          script: |
            # Cria a pasta se não existir, sem dar erro se já existir
            sudo mkdir -p /var/inetpub/wwwroot/lab${{ vars.ALUNO_NUM }}
            sudo chown -R ${{ vars.SSH_USER }}:${{ vars.SSH_USER }} /var/inetpub/wwwroot/lab${{ vars.ALUNO_NUM }}

      # 2. ENVIAR ARQUIVOS VIA SCP
      - name: Copiar arquivos para o Lab
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT }}
          source: "."
          target: "/var/inetpub/wwwroot/lab${{ vars.ALUNO_NUM }}"

      # 3. REINICIAR O SERVIÇO NO SWARM
      - name: Atualizar Servico Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT }}
          script: |
            # Aqui usamos o nome da stack (ajuste para 'labs' ou o nome que definiu)
            docker service update --force labs_python_lab${{ vars.ALUNO_NUM }}