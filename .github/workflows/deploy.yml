  deploy:
    name: Deploy to Swarm
    needs: build
    runs-on: ubuntu-latest
    steps:
      # 1. Precisamos baixar o repo neste job também para ter acesso ao arquivo .yaml
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Copia o arquivo da pasta infra para o servidor
      - name: Copy stack file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "infra/labprovas.yaml" # Arquivo na raiz do repo
          target: "/home/${{ vars.SSH_USER }}/deploy" # Destino no servidor

      # 3. Executa o deploy via SSH
- name: Trigger remote deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Injetamos o SHA como variável de ambiente
          IMAGE_TAG: "${{ github.sha }}"
          REGISTRY: "ghcr.io/adrianorosa02-seducsp/geduc"
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Login
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Força o pull da imagem específica
            docker pull "$REGISTRY:$IMAGE_TAG"
            
            # Atualiza o serviço diretamente com a nova imagem
            # Isso é mais eficiente que o stack deploy para mudanças de imagem
            docker service update \
              --image "$REGISTRY:$IMAGE_TAG" \
              --with-registry-auth \
              apps_geduc
          #envs: DEPLOY_IMAGE,SERVICE_NAME
